{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3"><h3>Stok Obat</h3><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createMed">+ Obat</button></div>
<table class="table table-striped"><thead><tr><th>Nama</th><th>Unit</th><th>Kategori</th><th>Stok</th></tr></thead><tbody>
{% for m in medicines %}<tr><td>{{ m.name }}</td><td>{{ m.unit }}</td><td>{{ m.category }}</td><td>{{ m.stock }}</td></tr>{% endfor %}
</tbody></table>
<div class="modal fade" id="createMed"><div class="modal-dialog"><div class="modal-content"><form method="post" action="{{ url_for('inventory.create') }}">
<div class="modal-header"><h5>Tambah Obat</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<input class="form-control mb-2" name="name" placeholder="Nama obat" required>
<input class="form-control mb-2" name="unit" placeholder="Unit" required>
<input class="form-control mb-2" name="category" placeholder="Kategori">
<input class="form-control mb-2" name="stock" type="number" placeholder="Stok" value="0">
<textarea class="form-control" name="description" placeholder="Deskripsi"></textarea>
</div><div class="modal-footer"><button class="btn btn-success">Simpan</button></div>
</form></div></div></div>
{% endblock %}
