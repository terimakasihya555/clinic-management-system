{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
  <h3>Data Pasien</h3>
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createPatient">+ Pasien</button>
</div>
<table class="table table-striped table-hover">
  <thead><tr><th>RM</th><th>Nama</th><th>Telepon</th><th>Aksi</th></tr></thead>
  <tbody>
  {% for p in patients %}
  <tr>
    <td>{{ p.medical_record_number }}</td><td>{{ p.name }}</td><td>{{ p.phone }}</td>
    <td>
      <form class="d-inline" method="post" action="{{ url_for('queue.add', patient_id=p.id) }}">
        <select name="kind" class="form-select form-select-sm d-inline w-auto">
          <option value="walkin">Datang langsung</option><option value="appointment">Janji temu</option><option value="emergency">Darurat</option>
        </select>
        <button class="btn btn-primary btn-sm">Buat Antrian</button>
      </form>
    </td>
  </tr>
  {% endfor %}
  </tbody>
</table>
<div class="modal fade" id="createPatient"><div class="modal-dialog"><div class="modal-content">
<form method="post" action="{{ url_for('patients.create') }}">
<div class="modal-header"><h5>Tambah Pasien</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<input class="form-control mb-2" name="name" placeholder="Nama" required>
<input class="form-control mb-2" name="birthdate" type="date">
<select class="form-select mb-2" name="gender"><option>Laki-laki</option><option>Perempuan</option></select>
<input class="form-control mb-2" name="phone" placeholder="Telepon">
<textarea class="form-control" name="address" placeholder="Alamat"></textarea>
</div><div class="modal-footer"><button class="btn btn-success">Simpan</button></div>
</form></div></div></div>
{% endblock %}
